{% extends "base.html" %}

{% block title %}Enroll | FaceGuard{% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-6">
        <h1 class="text-3xl font-bold">Enroll your face</h1>
        <p class="text-base-content/70 mt-2">
            Add a verified face enrollment so FaceGuard can protect your matches.
        </p>
    </div>

    <div class="card bg-base-100 shadow">
        <div class="card-body">
            <form
                hx-post="/enroll"
                hx-target="#enroll-result"
                hx-swap="innerHTML"
                hx-encoding="multipart/form-data"
                class="space-y-6"
            >
                <div class="form-control">
                    <label class="label" for="photo">
                        <span class="label-text font-medium">Face photo</span>
                    </label>
                    <input
                        id="photo"
                        name="photo"
                        type="file"
                        accept="image/*"
                        required
                        class="file-input file-input-bordered w-full"
                    >
                </div>

                <div class="form-control">
                    <label class="label" for="liveness_blob">
                        <span class="label-text font-medium">Liveness image</span>
                    </label>
                    <input
                        id="liveness_blob"
                        name="liveness_blob"
                        type="file"
                        accept="image/*"
                        required
                        class="file-input file-input-bordered w-full"
                    >
                </div>

                <div class="flex items-center gap-3">
                    <button type="submit" class="btn btn-primary">
                        Enroll
                    </button>

                    <span class="htmx-indicator loading loading-spinner loading-sm"></span>
                </div>
            </form>

            <div id="enroll-result" class="mt-6"></div>
        </div>
    </div>
</div>
{% endblock %}
