<div id="search-results">
    {% if not matches %}
    <p class="text-center text-base-content/70">No matches yet. We'll keep monitoring.</p>
    {% else %}
    <ul class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        {% for match in matches %}
        <li class="card bg-base-100 shadow match-card">
            <div class="card-body">
                <h3 class="card-title text-sm break-all">{{ match.source_page }}</h3>
                <p class="text-xs">score: {{ "%.3f"|format(match.score) }}</p>
                <a href="/matches/{{ match.match_id }}" class="btn btn-primary btn-sm">View</a>
            </div>
        </li>
        {% endfor %}
    </ul>
    {% endif %}
</div>
