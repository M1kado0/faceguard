global:
  scrape_interval: 15s

scrape_configs:
  - job_name: backend
    static_configs:
      - targets: ["host.docker.internal:8002"]
  - job_name: ml
    static_configs:
      - targets: ["host.docker.internal:8003"]
  - job_name: public-site
    static_configs:
      - targets: ["host.docker.internal:8000"]
  - job_name: admin-panel
    static_configs:
      - targets: ["host.docker.internal:8001"]
